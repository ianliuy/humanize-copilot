<!DOCTYPE html>
<html lang="en" data-theme="dark" data-lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanize Viz</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/theme.css?v=2">
    <link rel="stylesheet" href="/css/layout.css?v=2">

    <!-- CDN libs -->
    <script src="https://unpkg.com/marked@15.0.7/marked.min.js"></script>
    <script src="https://unpkg.com/dompurify@3.2.4/dist/purify.min.js"></script>
</head>
<body>
    <!-- Grain overlay for atmosphere -->
    <div class="grain-overlay" aria-hidden="true"></div>

    <!-- Top bar -->
    <header class="topbar" id="topbar">
        <div class="topbar-left" id="topbar-left">
            <div class="topbar-logo">
                <span class="logo-mark">⬡</span>
                <span class="logo-text" id="logo-text"></span>
            </div>
        </div>
        <span class="topbar-title" id="topbar-title"></span>
        <div class="topbar-right">
            <a class="topbar-link" href="#/">Home</a>
            <a class="topbar-link" id="analytics-link" href="#/analytics"></a>
            <button class="topbar-btn" id="theme-btn" onclick="toggleTheme()"></button>
            <div class="dropdown" id="ops-dropdown-container" style="display:none">
                <button class="topbar-btn" onclick="toggleOpsMenu()" id="ops-btn">⋯</button>
                <div class="dropdown-menu" id="ops-dropdown">
                    <button class="dropdown-item" onclick="showPlanViewer(window._currentSession?.id)" id="ops-plan"></button>
                    <button class="dropdown-item" onclick="navigate('#/session/' + window._currentSession?.id + '/analysis')" id="ops-analysis"></button>
                    <button class="dropdown-item" onclick="opsPreviewIssue(window._currentSession?.id)" id="ops-preview-issue"></button>
                    <button class="dropdown-item" onclick="exportMarkdown(window._currentSession?.id)" id="ops-export-md"></button>
                    <button class="dropdown-item" onclick="exportPdf()" id="ops-export-pdf"></button>
                    <hr class="dropdown-divider">
                    <button class="dropdown-item danger" onclick="showCancelModal(window._currentSession?.id)" id="ops-cancel"></button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main id="main-content"></main>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal" id="modal-content"></div>
    </div>

    <!-- Scripts -->
    <script src="/js/i18n.js?v=4"></script>
    <script src="/js/pipeline.js?v=4"></script>
    <script src="/js/actions.js?v=4"></script>
    <script src="/js/app.js?v=4"></script>
</body>
</html>
